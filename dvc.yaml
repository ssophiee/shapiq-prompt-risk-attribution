stages:
  prepare_dataset:
    cmd: uv run python -m shapiq_attribution.data build-dataset --raw-dir data/raw --output-path data/processed/prompt_risk_dataset.jsonl
    deps:
      - data/raw
      - src/shapiq_attribution/data.py
    outs:
      - data/processed/prompt_risk_dataset.jsonl
  split_data:
    cmd: uv run python -m shapiq_attribution.split_data
    deps:
      - configs/train.yaml
      - data/processed/prompt_risk_dataset.jsonl
      - src/shapiq_attribution/data.py
      - src/shapiq_attribution/split_data.py
    outs:
      - data/processed/train.jsonl
      - data/processed/val.jsonl
      - data/processed/test.jsonl

  train_vertex_ddp:
    cmd: uv run python -m shapiq_attribution.train hardware=ddp
    deps:
      - configs/train.yaml
      - configs/hardware
      - data/processed/train.jsonl
      - data/processed/val.jsonl
      - data/processed/test.jsonl
      - src/shapiq_attribution/data.py
      - src/shapiq_attribution/lightning_data_module.py
      - src/shapiq_attribution/lightning_module.py
      - src/shapiq_attribution/model.py
      - src/shapiq_attribution/train.py
    outs:
      - models/prompt_risk_distilbert
    metrics:
      - reports/metrics.json
