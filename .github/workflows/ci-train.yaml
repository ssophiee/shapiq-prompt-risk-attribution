name: ci-train

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build-train:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra cpu

      - name: Run training-slice tests
        run: uv run pytest tests/test_data.py tests/test_split_data.py tests/test_model.py tests/test_train.py

      - name: Build training image
        run: docker build -t shapiq-train:latest . -f dockerfiles/train.dockerfile --progress=plain
