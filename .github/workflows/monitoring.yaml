name: monitoring

# Weekly drift + health report over accumulated production predictions.
# Compares the live feature distribution (data/monitoring/predictions.csv)
# against the training baseline (data/monitoring/baseline.csv) with Evidently
# and uploads the rendered HTML dashboard as a build artifact.
on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  drift-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra cpu

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Fetch monitoring data from GCS
        # Baseline is uploaded by deploy/cloudrun.sh; predictions are logged
        # by the deployed API, one JSON blob per /predict call.
        env:
          MONITORING_BUCKET: mlops-shapiq-project-monitoring
        run: |
          uv run python -m shapiq_attribution.monitoring fetch-baseline
          uv run python -m shapiq_attribution.monitoring fetch

      - name: Generate Evidently drift report
        run: uv run python -m shapiq_attribution.monitoring report

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/monitoring/drift_report.html
          if-no-files-found: error
