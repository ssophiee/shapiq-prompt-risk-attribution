name: monitoring

# Weekly drift + health report over accumulated production predictions.
# Compares the live feature distribution (data/monitoring/predictions.csv)
# against the training baseline (data/monitoring/baseline.csv) with Evidently
# and uploads the rendered HTML dashboard as a build artifact.
on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  drift-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pull monitoring data from DVC
        # Best-effort: the report can still run if the data is already committed.
        continue-on-error: true
        run: uv run dvc pull data/monitoring/baseline.csv data/monitoring/predictions.csv

      - name: Generate Evidently drift report
        run: uv run python -m shapiq_attribution.monitoring report

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/monitoring/drift_report.html
          if-no-files-found: error
