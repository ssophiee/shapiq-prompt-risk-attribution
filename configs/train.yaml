defaults:
  - _self_
  - hardware: local
  - profiling: disabled

data:
  input_path: data/processed/prompt_risk_dataset.jsonl
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl
  test_path: data/processed/test.jsonl
  train_size: 0.8
  val_size: 0.1
  test_size: 0.1
  seed: 12
  stratify: true

model:
  name: distilbert-base-uncased
  num_labels: 2
  max_length: 128

training:
  epochs: 3
  batch_size: 16
  learning_rate: 2e-5
  weight_decay: 0.01
  seed: 12
  accelerator: auto
  devices: 1
  strategy: auto
  num_nodes: 1
  precision: 32-true
  accumulate_grad_batches: 1
  deterministic: false
  dynamic_padding: true
  length_grouped_batching: true
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  log_every_n_steps: 10

output:
  model_dir: models/prompt_risk_distilbert
  metrics_path: reports/metrics.json

checkpoint:
  dirpath: outputs/checkpoints/prompt_risk
  filename: prompt-risk-{epoch:02d}
  monitor: val/roc_auc
  mode: max
  save_top_k: 1
  save_last: link
  resume_from: null

wandb:
  project: shapiq-attribution
  entity: null
  mode: online
  run_name: distilbert-prompt-risk
  save_dir: outputs/wandb
  log_model: false
